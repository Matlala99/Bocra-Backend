server:
  port: 8083

  error:
    include-message: always

spring:
  application:
    name: hackathon-backend
  datasource:
    url: jdbc:mysql://localhost:3306/bocra_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret: aVeryLongSecureSecretKeyForHackathonDemoDoNotUseInProd1234567890
    expiration-ms: 86400000 # 24 Hours
  cors:
    allowed-origins: https://bocra-hackathon-iota.vercel.app # Next.js frontend

logging:
  level:
    bw.org.bocra.backend: DEBUG
    org.springframework.security: INFO
