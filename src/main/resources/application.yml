server:
  port: ${SERVER_PORT:8083}

  error:
    include-message: always

spring:
  application:
    name: hackathon-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bocra_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret: ${APP_JWT_SECRET:aVeryLongSecureSecretKeyForHackathonDemoDoNotUseInProd1234567890}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000} # 24 Hours
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://bocra-hackathon-iota.vercel.app}

logging:
  level:
    bw.org.bocra.backend: DEBUG
    org.springframework.security: INFO
